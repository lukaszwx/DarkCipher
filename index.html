<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dark Cipher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<main class="app">

    <header class="app-header">
        <div class="logo">
            <i class="bi bi-key-fill"></i>
            <span>Dark Cipher</span>
        </div>
        <small class="version">v1.0</small>
    </header>

    <section class="terminal">

        <div class="terminal-header">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <div class="terminal-body">

            <label for="inputText">Entrada</label>
            <textarea id="inputText" placeholder="Digite seu texto..."></textarea>

            <div class="actions">
                <button class="btn-glitch" data-action="encode">
                    Criptografar
                </button>

                <button class="btn-glitch" data-action="decode">
                    Descriptografar
                </button>
            </div>

            <label>Saída</label>
            <div id="output" class="output">
                _aguardando comando_
            </div>

        </div>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
